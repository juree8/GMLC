<!DOCTYPE html>
<html>
<head>
<title>GMLC Invitation</title>
<style>
  body {
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;

    /* desktop background */
    background-image: url('bg.jpg');
    background-position: center center;
    background-size: cover;
    background-repeat: no-repeat;

    background-color: rgba(0,0,0,0.35);
    background-blend-mode: darken;
  }

  /* mobile background override */
  @media screen and (max-width: 768px) {
    body {
      background-image: url('gb.jpg') !important;
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    h2 {
      font-size: 22px;
    }

    button {
      padding: 12px 28px;
    }
  }

  #noBtn {
    position: absolute;
  }

  .container {
    text-align: center;
    color: white;
  }

  .topline {
    font-size: 18px;
    margin-bottom: 8px;
    letter-spacing: 2px;
    color: #ffd700;
  }

  button {
    padding: 14px 36px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border-radius: 40px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.08);
    color: white;
    font-weight: bold;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    backdrop-filter: blur(4px);
  }

  .yes-btn {
    border-color: #00ff9c;
    box-shadow: 0 0 8px #00ff9c, 0 0 18px #00ff9c;
  }

  .yes-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 14px #00ff9c, 0 0 30px #00ff9c;
  }

  .no-btn {
    border-color: #ff3b3b;
    box-shadow: 0 0 8px #ff3b3b, 0 0 18px #ff3b3b;
  }

  .no-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 14px #ff3b3b, 0 0 30px #ff3b3b;
  }

  #transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #transition.active {
    opacity: 1;
    pointer-events: all;
  }

  .message {
    color: white;
    font-size: 28px;
    animation: fadeText 1.2s infinite alternate;
  }

  @keyframes fadeText {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="topline">Do You Dare To Move Ahead?</div>
  <h2>Na Bolkr dikha do !!</h2>
  <button class="yes-btn" onclick="showTransition()">Yes</button>
  <button id="noBtn" class="no-btn">No</button>
</div>

<div id="transition">
  <div class="message">Opening something special....</div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
let count = 0;

noBtn.addEventListener("mouseover", () => {
  count++;

  if(count === 5) alert("Stop trying 😭");
  if(count === 10) alert("You cannot escape destiny 😎");
  if(count === 30) alert("You still trying???? 😭");

  const padding = 30;

  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  const randomX = Math.max(padding, Math.random() * maxX);
  const randomY = Math.max(padding, Math.random() * maxY);

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
});

function showTransition() {
  const screen = document.getElementById("transition");
  screen.classList.add("active");

  setTimeout(() => {
    window.location.href = "https://www.instagram.com/gmlc_iimi/";
  }, 1800);
}
</script>

</body>
</html>
